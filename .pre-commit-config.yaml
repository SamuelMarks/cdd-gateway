repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  - repo: local
    hooks:
      - id: zig-fmt
        name: zig fmt
        entry: zig fmt
        language: system
        types: [file]
        files: \.zig$
      - id: zig-test
        name: zig test
        entry: zig build test
        language: system
        types: [file]
        files: \.zig$
        pass_filenames: false