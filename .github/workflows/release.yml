name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev gcc libpq-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-unknown-linux-gnu

      - name: Build Release
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Create Release Archive
        run: |
          tar -czvf cdd-gateway-x86_64-unknown-linux-gnu.tar.gz -C target/x86_64-unknown-linux-gnu/release cdd-gateway

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: cdd-gateway-x86_64-unknown-linux-gnu.tar.gz
          generate_release_notes: true
