name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libssl-dev gcc

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Install cargo-tarpaulin
      run: cargo install cargo-tarpaulin

    - name: Run checks
      run: cargo check --verbose

    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Run tests & coverage
      run: cargo tarpaulin --verbose --workspace --timeout 120 --out xml

    - name: Build docs
      run: cargo doc --no-deps

    - name: Build debian Docker image
      run: docker build -t cdd-ctl:debian -f debian.Dockerfile .

    - name: Build alpine Docker image
      run: docker build -t cdd-ctl:alpine -f alpine.Dockerfile .

