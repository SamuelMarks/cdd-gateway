name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.13.0
    
    - name: Check Formatting
      run: zig fmt --check .
      if: matrix.os == 'ubuntu-latest'
      
    - name: Build
      run: zig build
      
    - name: Test
      run: zig build test
      
    - name: Generate Docs
      run: zig build docs
      if: matrix.os == 'ubuntu-latest'
      
    # Note: A real coverage solution would integrate kcov here for Linux
    # For now, we ensure tests pass and badges in README reflect success.
